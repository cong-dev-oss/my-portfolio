<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Big Bang & 12 Constellations in Universe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="intro-overlay">
    <div id="intro-card">
      <div id="intro-title">MY PORTFOLIO</div>
      <button id="about-btn" type="button" disabled>About Me</button>
      <div id="countdown-display"></div>
    </div>
  </div>

  <div id="terminal-overlay">
    <div id="terminal-layout">
      <div class="terminal-window terminal-window-left">
        <div class="terminal-titlebar">Command Prompt</div>
        <div class="terminal-body">
          <div class="avatar-scan">
            <img id="profile-avatar" src="img/Cong-min.jpg" alt="Ảnh đại diện">
          </div>
          <div id="profile-text"></div>
        </div>
      </div>
      <div class="terminal-window terminal-window-right">
        <div class="terminal-titlebar">Command Prompt</div>
        <div id="terminal-body" class="terminal-body">
          <div id="terminal-text"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
